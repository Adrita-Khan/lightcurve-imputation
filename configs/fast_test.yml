# Fast-test configuration: reduced seeds and epochs for CI/CD or quick checks.
# Inherits defaults from experiment.yml; override only what changes.

signal:
  N: 1323
  dt: 0.0204
  A: 0.1
  P0: 1.0
  phi0: 0.0
  mu0: 1.0
  sigma_eps: 0.02
  seed: 0

missingness:
  fractions: [0.10, 0.30]
  block_ratio: 0.50
  block_min_len: 5
  block_max_len: 50
  n_seeds: 3            # Only 3 seeds for speed

methods:
  mean_fill: true
  forward_fill: true
  linear_interp: true
  spline_interp: true
  gp_matern: false      # Skip slow methods in fast test
  ts_mice: true
  knn_impute: true
  rf_impute: true
  rnn_impute: false
  gain_impute: false
  mf_impute: true
  gb_mice: false
  saits: false

method_params:
  ts_mice:
    L: 3
    n_chains: 2
    max_iter: 3
  knn_impute:
    k: 5
    W: 10
  rf_impute:
    n_estimators: 10
    L: 5
  mf_impute:
    rank: 5
    alpha: 0.001
    tol: 0.001
    max_iter: 20

evaluation:
  period_tol: 0.01
  eps_stab: 1.0e-8

output:
  results_dir: "data/results"
  figures_dir: "figures"
  tables_dir: "tables"
  figure_formats: ["png"]
  dpi: 150

reproducibility:
  base_seed: 42

parallel:
  n_jobs: 1
