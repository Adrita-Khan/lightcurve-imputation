name: kepler-imputation
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy>=1.24
  - scipy>=1.11
  - pandas>=2.0
  - matplotlib>=3.7
  - seaborn>=0.13
  - scikit-learn>=1.3
  - jupyter
  - ipykernel
  - ipywidgets
  - tqdm
  - joblib
  - pyyaml
  - click
  - pytest
  - pytest-cov
  - pip
  - pip:
    - lightkurve>=2.4.2
    - astropy>=5.3.0
    - astroquery>=0.4.6
    - george>=0.4.0
    - torch>=2.1.0
    - xgboost>=2.0.0
    - scikit-posthocs>=0.8.0
